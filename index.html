<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Grayson's Lugia</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000;
  touch-action: none;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
canvas {
  display: block;
  width: 100%; height: 100%;
  object-fit: contain;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// ============================================================
// GRAYSON'S LUGIA — Side-Scrolling Shooter
// ============================================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// --- Responsive sizing ---
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// --- Asset loading ---
const playerImg = new Image();
playerImg.src = 'grayson-lugia.png';

let assetsLoaded = false;
playerImg.onload = () => { assetsLoaded = true; };

// --- Sound effects (generated programmatically) ---
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playShoot() {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'square';
  osc.frequency.setValueAtTime(800, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.1);
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.1);
}

function playExplosion() {
  ensureAudio();
  const bufferSize = audioCtx.sampleRate * 0.3;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
  }
  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
  source.connect(gain);
  gain.connect(audioCtx.destination);
  source.start();
}

function playHit() {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(200, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.4);
  gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.4);
}

function playGameOver() {
  ensureAudio();
  const notes = [400, 350, 300, 200];
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime + i * 0.2);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.2 + 0.2);
    osc.start(audioCtx.currentTime + i * 0.2);
    osc.stop(audioCtx.currentTime + i * 0.2 + 0.25);
  });
}

function playCelebration() {
  ensureAudio();
  const notes = [523, 659, 784, 1047];
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime + i * 0.15);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.15 + 0.3);
    osc.start(audioCtx.currentTime + i * 0.15);
    osc.stop(audioCtx.currentTime + i * 0.15 + 0.35);
  });
}

// --- Game state ---
const STATE = { TITLE: 0, PLAYING: 1, GAMEOVER: 2 };
let gameState = STATE.TITLE;
let score = 0;
let lives = 3;
let highScore = parseInt(localStorage.getItem('graysonsLugiaHighScore') || '0');

// Adaptive difficulty
function getDifficulty() {
  if (lives === 3) return { speed: 1.0, maxEnemies: 3, spawnRate: 0.015 };
  if (lives === 2) return { speed: 0.7, maxEnemies: 2, spawnRate: 0.010 };
  return { speed: 0.5, maxEnemies: 1, spawnRate: 0.006 };
}

// --- Player ---
const player = {
  x: 0, y: 0,
  width: 120, height: 90,
  targetY: 0,
  invincibleTimer: 0,
};

function resetPlayer() {
  player.x = canvas.width * 0.1;
  player.y = canvas.height * 0.5;
  player.targetY = player.y;
  player.invincibleTimer = 120; // 2 seconds of invincibility on spawn
}

// --- Projectiles ---
let bullets = [];
let shootTimer = 0;
const SHOOT_INTERVAL = 15; // frames between shots

// --- Enemies ---
let enemies = [];
const ENEMY_TYPES = [
  { name: 'small', width: 40, height: 25, hp: 1, speed: 3, color: '#e74c3c', points: 10 },
  { name: 'medium', width: 60, height: 35, hp: 2, speed: 2, color: '#e67e22', points: 20 },
  { name: 'big', width: 80, height: 50, hp: 3, speed: 1.5, color: '#8e44ad', points: 30 },
];

// --- Particles (explosions) ---
let particles = [];

function spawnExplosion(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 30 + Math.random() * 20,
      maxLife: 50,
      color,
      size: 2 + Math.random() * 4,
    });
  }
}

// --- Confetti (game over celebration) ---
let confetti = [];

function spawnConfetti() {
  const colors = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff6b9d', '#c084fc'];
  for (let i = 0; i < 100; i++) {
    confetti.push({
      x: Math.random() * canvas.width,
      y: -10 - Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 3,
      vy: 2 + Math.random() * 4,
      size: 4 + Math.random() * 6,
      color: colors[Math.floor(Math.random() * colors.length)],
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.2,
    });
  }
}

// --- Screen shake ---
let shakeAmount = 0;
let shakeDecay = 0.9;

function triggerShake(amount) {
  shakeAmount = amount;
}

// --- Parallax layers ---
const clouds = [];
const mountains = [];

function initParallax() {
  clouds.length = 0;
  mountains.length = 0;
  for (let i = 0; i < 8; i++) {
    clouds.push({
      x: Math.random() * canvas.width * 1.5,
      y: Math.random() * canvas.height * 0.5,
      width: 60 + Math.random() * 100,
      height: 20 + Math.random() * 30,
      speed: 0.3 + Math.random() * 0.5,
      opacity: 0.3 + Math.random() * 0.4,
    });
  }
  for (let i = 0; i < 5; i++) {
    mountains.push({
      x: i * (canvas.width / 3) + Math.random() * 100,
      width: 150 + Math.random() * 200,
      height: 80 + Math.random() * 120,
      speed: 0.2 + Math.random() * 0.3,
    });
  }
}

// --- Combo system ---
let combo = 0;
let comboTimer = 0;
let comboText = '';
let comboTextTimer = 0;

// --- Touch / Mouse input ---
let touching = false;

function getEventY(e) {
  if (e.touches && e.touches.length > 0) return e.touches[0].clientY;
  return e.clientY;
}

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  ensureAudio();
  if (gameState === STATE.TITLE) {
    startGame();
    return;
  }
  if (gameState === STATE.GAMEOVER) {
    startGame();
    return;
  }
  touching = true;
  player.targetY = getEventY(e);
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (gameState === STATE.PLAYING) {
    player.targetY = getEventY(e);
  }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  touching = false;
}, { passive: false });

// Mouse fallback for desktop testing
canvas.addEventListener('mousedown', (e) => {
  ensureAudio();
  if (gameState === STATE.TITLE) { startGame(); return; }
  if (gameState === STATE.GAMEOVER) { startGame(); return; }
  touching = true;
  player.targetY = e.clientY;
});

canvas.addEventListener('mousemove', (e) => {
  if (touching && gameState === STATE.PLAYING) {
    player.targetY = e.clientY;
  }
});

canvas.addEventListener('mouseup', () => { touching = false; });

// --- Game flow ---
function startGame() {
  gameState = STATE.PLAYING;
  score = 0;
  lives = 3;
  combo = 0;
  comboTimer = 0;
  bullets = [];
  enemies = [];
  particles = [];
  confetti = [];
  shakeAmount = 0;
  resetPlayer();
  initParallax();
}

function loseLife() {
  lives--;
  playHit();
  triggerShake(15);
  spawnExplosion(player.x + player.width / 2, player.y + player.height / 2, '#ffcc00', 20);
  if (lives <= 0) {
    gameState = STATE.GAMEOVER;
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('graysonsLugiaHighScore', String(highScore));
    }
    playGameOver();
    setTimeout(() => {
      playCelebration();
      spawnConfetti();
    }, 800);
  } else {
    resetPlayer();
  }
}

// --- Update ---
function update() {
  if (gameState !== STATE.PLAYING) return;

  const diff = getDifficulty();

  // Player movement (smooth follow)
  const dy = player.targetY - player.y;
  player.y += dy * 0.12;
  // Clamp to screen
  player.y = Math.max(10, Math.min(canvas.height - player.height - 10, player.y));

  // Invincibility countdown
  if (player.invincibleTimer > 0) player.invincibleTimer--;

  // Auto-shoot
  shootTimer++;
  if (shootTimer >= SHOOT_INTERVAL) {
    shootTimer = 0;
    bullets.push({
      x: player.x + player.width,
      y: player.y + player.height / 2 - 3,
      width: 14,
      height: 6,
      speed: 8,
    });
    playShoot();
  }

  // Move bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    bullets[i].x += bullets[i].speed;
    if (bullets[i].x > canvas.width + 20) bullets.splice(i, 1);
  }

  // Spawn enemies
  if (enemies.length < diff.maxEnemies && Math.random() < diff.spawnRate) {
    const type = ENEMY_TYPES[Math.floor(Math.random() * ENEMY_TYPES.length)];
    enemies.push({
      x: canvas.width + 10,
      y: 30 + Math.random() * (canvas.height - 80),
      width: type.width,
      height: type.height,
      hp: type.hp,
      maxHp: type.hp,
      speed: type.speed * diff.speed,
      color: type.color,
      points: type.points,
      wobble: Math.random() * Math.PI * 2,
      wobbleSpeed: 0.02 + Math.random() * 0.03,
      wobbleAmount: 20 + Math.random() * 30,
    });
  }

  // Move enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.x -= e.speed;
    e.wobble += e.wobbleSpeed;
    e.y += Math.sin(e.wobble) * 0.8;
    if (e.x + e.width < -20) enemies.splice(i, 1);
  }

  // Combo timer
  if (comboTimer > 0) {
    comboTimer--;
    if (comboTimer === 0) combo = 0;
  }
  if (comboTextTimer > 0) comboTextTimer--;

  // Bullet-enemy collisions
  for (let i = bullets.length - 1; i >= 0; i--) {
    for (let j = enemies.length - 1; j >= 0; j--) {
      const b = bullets[i];
      const e = enemies[j];
      if (b && e && rectsOverlap(b, e)) {
        bullets.splice(i, 1);
        e.hp--;
        if (e.hp <= 0) {
          // Kill
          score += e.points;
          combo++;
          comboTimer = 90; // 1.5 seconds to keep combo
          if (combo >= 3) {
            comboText = combo + ' in a row!';
            comboTextTimer = 60;
          }
          spawnExplosion(e.x + e.width / 2, e.y + e.height / 2, e.color, 15);
          playExplosion();
          triggerShake(5);
          enemies.splice(j, 1);
        } else {
          // Damaged
          spawnExplosion(b.x, b.y, '#fff', 5);
        }
        break;
      }
    }
  }

  // Player-enemy collisions
  if (player.invincibleTimer <= 0) {
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if (rectsOverlap(player, e)) {
        enemies.splice(j, 1);
        spawnExplosion(e.x + e.width / 2, e.y + e.height / 2, e.color, 20);
        loseLife();
        break;
      }
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Screen shake decay
  shakeAmount *= shakeDecay;
  if (shakeAmount < 0.5) shakeAmount = 0;

  // Parallax
  clouds.forEach(c => {
    c.x -= c.speed;
    if (c.x + c.width < 0) { c.x = canvas.width + 50; c.y = Math.random() * canvas.height * 0.5; }
  });
  mountains.forEach(m => {
    m.x -= m.speed;
    if (m.x + m.width < -50) { m.x = canvas.width + 100; }
  });
}

function rectsOverlap(a, b) {
  return a.x < b.x + b.width && a.x + a.width > b.x &&
         a.y < b.y + b.height && a.y + a.height > b.y;
}

// --- Draw ---
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (gameState === STATE.TITLE) {
    drawTitle();
  } else if (gameState === STATE.PLAYING) {
    drawGame();
  } else if (gameState === STATE.GAMEOVER) {
    drawGameOver();
  }
}

function drawTitle() {
  // Sky gradient background
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, '#1a1a3e');
  grad.addColorStop(0.5, '#2d4a7a');
  grad.addColorStop(1, '#e8a87c');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw player image as hero
  if (assetsLoaded) {
    const imgAspect = playerImg.width / playerImg.height;
    let drawH = canvas.height * 0.55;
    let drawW = drawH * imgAspect;
    if (drawW > canvas.width * 0.85) {
      drawW = canvas.width * 0.85;
      drawH = drawW / imgAspect;
    }
    const drawX = (canvas.width - drawW) / 2;
    const drawY = canvas.height * 0.22;
    ctx.drawImage(playerImg, drawX, drawY, drawW, drawH);
  }

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffd700';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 4;
  const titleSize = Math.min(canvas.width * 0.1, 54);
  ctx.font = `bold ${titleSize}px "Arial Rounded MT Bold", Arial, sans-serif`;
  ctx.strokeText("Grayson's Lugia", canvas.width / 2, canvas.height * 0.14);
  ctx.fillText("Grayson's Lugia", canvas.width / 2, canvas.height * 0.14);

  // Tap to start (pulsing)
  const pulse = 0.7 + Math.sin(Date.now() / 400) * 0.3;
  ctx.globalAlpha = pulse;
  const startSize = Math.min(canvas.width * 0.06, 28);
  ctx.font = `bold ${startSize}px Arial, sans-serif`;
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 3;
  ctx.strokeText('TAP TO START', canvas.width / 2, canvas.height * 0.88);
  ctx.fillText('TAP TO START', canvas.width / 2, canvas.height * 0.88);
  ctx.globalAlpha = 1;
}

function drawGame() {
  ctx.save();

  // Apply screen shake
  if (shakeAmount > 0) {
    const sx = (Math.random() - 0.5) * shakeAmount;
    const sy = (Math.random() - 0.5) * shakeAmount;
    ctx.translate(sx, sy);
  }

  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, '#87CEEB');
  grad.addColorStop(0.6, '#b0d4f1');
  grad.addColorStop(1, '#2980b9');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Ocean at bottom
  ctx.fillStyle = '#1a5276';
  ctx.fillRect(0, canvas.height * 0.85, canvas.width, canvas.height * 0.15);
  // Ocean waves
  ctx.fillStyle = '#2471a3';
  for (let i = 0; i < canvas.width; i += 40) {
    const waveY = canvas.height * 0.85 + Math.sin((i + Date.now() * 0.002) * 0.05) * 5;
    ctx.beginPath();
    ctx.arc(i, waveY, 20, Math.PI, 0);
    ctx.fill();
  }

  // Mountains (parallax)
  mountains.forEach(m => {
    ctx.fillStyle = '#5d6d7e';
    ctx.beginPath();
    ctx.moveTo(m.x, canvas.height * 0.85);
    ctx.lineTo(m.x + m.width / 2, canvas.height * 0.85 - m.height);
    ctx.lineTo(m.x + m.width, canvas.height * 0.85);
    ctx.closePath();
    ctx.fill();
    // Snow cap
    ctx.fillStyle = '#d5dbdb';
    ctx.beginPath();
    ctx.moveTo(m.x + m.width * 0.35, canvas.height * 0.85 - m.height * 0.7);
    ctx.lineTo(m.x + m.width / 2, canvas.height * 0.85 - m.height);
    ctx.lineTo(m.x + m.width * 0.65, canvas.height * 0.85 - m.height * 0.7);
    ctx.closePath();
    ctx.fill();
  });

  // Clouds (parallax)
  clouds.forEach(c => {
    ctx.fillStyle = `rgba(255, 255, 255, ${c.opacity})`;
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, c.width / 2, c.height / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x - c.width * 0.25, c.y + 5, c.width * 0.3, c.height * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x + c.width * 0.25, c.y + 3, c.width * 0.35, c.height * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();
  });

  // Bullets
  bullets.forEach(b => {
    // Energy ball style
    ctx.fillStyle = '#7ec8e3';
    ctx.shadowColor = '#7ec8e3';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.ellipse(b.x + b.width / 2, b.y + b.height / 2, b.width / 2, b.height / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  // Enemies (planes)
  enemies.forEach(e => {
    // Body
    ctx.fillStyle = e.color;
    ctx.fillRect(e.x, e.y, e.width, e.height);
    // Cockpit
    ctx.fillStyle = '#2c3e50';
    ctx.fillRect(e.x + 2, e.y + e.height * 0.3, e.width * 0.2, e.height * 0.4);
    // Wings
    ctx.fillStyle = e.color;
    ctx.beginPath();
    ctx.moveTo(e.x + e.width * 0.3, e.y);
    ctx.lineTo(e.x + e.width * 0.5, e.y - e.height * 0.4);
    ctx.lineTo(e.x + e.width * 0.6, e.y);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(e.x + e.width * 0.3, e.y + e.height);
    ctx.lineTo(e.x + e.width * 0.5, e.y + e.height + e.height * 0.4);
    ctx.lineTo(e.x + e.width * 0.6, e.y + e.height);
    ctx.closePath();
    ctx.fill();
    // Tail fin
    ctx.beginPath();
    ctx.moveTo(e.x + e.width * 0.85, e.y);
    ctx.lineTo(e.x + e.width, e.y - e.height * 0.25);
    ctx.lineTo(e.x + e.width, e.y);
    ctx.closePath();
    ctx.fill();
    // HP bar for multi-hp enemies
    if (e.maxHp > 1) {
      ctx.fillStyle = '#333';
      ctx.fillRect(e.x, e.y - 8, e.width, 4);
      ctx.fillStyle = '#2ecc71';
      ctx.fillRect(e.x, e.y - 8, e.width * (e.hp / e.maxHp), 4);
    }
  });

  // Player (Grayson on Lugia)
  if (assetsLoaded) {
    // Blinking when invincible
    if (player.invincibleTimer > 0 && Math.floor(player.invincibleTimer / 5) % 2 === 0) {
      ctx.globalAlpha = 0.4;
    }
    const imgAspect = playerImg.width / playerImg.height;
    const drawH = player.height;
    const drawW = drawH * imgAspect;
    ctx.drawImage(playerImg, player.x, player.y, drawW, drawH);
    // Update player width to match drawn image
    player.width = drawW;
    ctx.globalAlpha = 1;
  } else {
    // Fallback rectangle
    ctx.fillStyle = '#a8d8ea';
    ctx.fillRect(player.x, player.y, player.width, player.height);
  }

  // Particles
  particles.forEach(p => {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  ctx.restore();

  // HUD
  drawHUD();
}

function drawHUD() {
  const pad = 12;
  const hudSize = Math.min(canvas.width * 0.05, 22);

  // Score
  ctx.textAlign = 'left';
  ctx.font = `bold ${hudSize}px Arial, sans-serif`;
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;
  ctx.strokeText('Score: ' + score, pad, pad + hudSize);
  ctx.fillText('Score: ' + score, pad, pad + hudSize);

  // Lives (hearts)
  ctx.textAlign = 'right';
  let heartsStr = '';
  for (let i = 0; i < lives; i++) heartsStr += '\u2764 ';
  ctx.fillStyle = '#e74c3c';
  ctx.strokeText(heartsStr, canvas.width - pad, pad + hudSize);
  ctx.fillText(heartsStr, canvas.width - pad, pad + hudSize);

  // Combo text
  if (comboTextTimer > 0) {
    const comboSize = Math.min(canvas.width * 0.08, 36);
    ctx.textAlign = 'center';
    ctx.font = `bold ${comboSize}px Arial, sans-serif`;
    ctx.fillStyle = '#ffd700';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    const comboAlpha = comboTextTimer / 60;
    ctx.globalAlpha = comboAlpha;
    ctx.strokeText(comboText, canvas.width / 2, canvas.height * 0.2);
    ctx.fillText(comboText, canvas.width / 2, canvas.height * 0.2);
    ctx.globalAlpha = 1;
  }
}

function drawGameOver() {
  // Draw last game frame dimmed
  drawGame();
  ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Confetti
  confetti.forEach(c => {
    c.x += c.vx;
    c.y += c.vy;
    c.rotation += c.rotSpeed;
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rotation);
    ctx.fillStyle = c.color;
    ctx.fillRect(-c.size / 2, -c.size / 2, c.size, c.size * 0.6);
    ctx.restore();
  });

  ctx.textAlign = 'center';

  // "AMAZING JOB GRAYSON!"
  const titleSize = Math.min(canvas.width * 0.09, 44);
  ctx.font = `bold ${titleSize}px "Arial Rounded MT Bold", Arial, sans-serif`;
  ctx.fillStyle = '#ffd700';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 4;
  ctx.strokeText('AMAZING JOB', canvas.width / 2, canvas.height * 0.3);
  ctx.fillText('AMAZING JOB', canvas.width / 2, canvas.height * 0.3);
  ctx.strokeText('GRAYSON!', canvas.width / 2, canvas.height * 0.3 + titleSize * 1.2);
  ctx.fillText('GRAYSON!', canvas.width / 2, canvas.height * 0.3 + titleSize * 1.2);

  // Score
  const scoreSize = Math.min(canvas.width * 0.065, 30);
  ctx.font = `bold ${scoreSize}px Arial, sans-serif`;
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;
  ctx.strokeText('Enemies Destroyed: ' + score, canvas.width / 2, canvas.height * 0.55);
  ctx.fillText('Enemies Destroyed: ' + score, canvas.width / 2, canvas.height * 0.55);

  // High score
  ctx.fillStyle = '#ffd700';
  ctx.strokeText('Best: ' + highScore, canvas.width / 2, canvas.height * 0.55 + scoreSize * 1.5);
  ctx.fillText('Best: ' + highScore, canvas.width / 2, canvas.height * 0.55 + scoreSize * 1.5);

  // Tap to play again
  const pulse = 0.6 + Math.sin(Date.now() / 400) * 0.4;
  ctx.globalAlpha = pulse;
  const startSize = Math.min(canvas.width * 0.05, 24);
  ctx.font = `bold ${startSize}px Arial, sans-serif`;
  ctx.fillStyle = '#fff';
  ctx.strokeText('TAP TO PLAY AGAIN', canvas.width / 2, canvas.height * 0.8);
  ctx.fillText('TAP TO PLAY AGAIN', canvas.width / 2, canvas.height * 0.8);
  ctx.globalAlpha = 1;
}

// --- Game loop ---
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// Start
gameLoop();
</script>
